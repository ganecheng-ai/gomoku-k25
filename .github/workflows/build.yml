name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            arch: x86_64
            target: linux
            ext: tar.gz
          - os: windows-latest
            name: Windows
            arch: x64
            target: windows
            ext: exe
          - os: macos-latest
            name: macOS
            arch: universal
            target: macos
            ext: dmg

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies (Ubuntu)
      if: matrix.target == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-pip libsdl2-dev libsdl2-mixer-2.0-0 libsdl2-image-2.0-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable (Linux)
      if: matrix.target == 'linux'
      run: |
        cd src
        pyinstaller --onefile --windowed \
          --name gomoku \
          --add-data "../assets:assets" \
          --hidden-import game \
          --hidden-import board \
          --hidden-import renderer \
          --hidden-import config \
          --hidden-import utils \
          --icon=NONE \
          main.py
        cd dist
        tar -czf gomoku-linux-x86_64.tar.gz gomoku

    - name: Build executable (Windows)
      if: matrix.target == 'windows'
      run: |
        cd src
        pyinstaller --onefile --windowed `
          --name gomoku `
          --add-data "../assets;assets" `
          --hidden-import game `
          --hidden-import board `
          --hidden-import renderer `
          --hidden-import config `
          --hidden-import utils `
          --icon=NONE `
          main.py
        move dist\gomoku.exe ..
        cd ..
        ren gomoku.exe gomoku-windows-x64.exe

    - name: Build executable (macOS)
      if: matrix.target == 'macos'
      run: |
        cd src
        # macOS 使用 onedir 模式避免 onefile + windowed 冲突
        pyinstaller --onedir --windowed \
          --name gomoku \
          --add-data "../assets:assets" \
          --hidden-import game \
          --hidden-import board \
          --hidden-import renderer \
          --hidden-import config \
          --hidden-import utils \
          main.py
        cd dist
        # 打包为 dmg
        hdiutil create -volname "Gomoku" -srcfolder gomoku.app -ov -format UDZO gomoku-macos-universal.dmg

    - name: Upload Linux artifact
      if: matrix.target == 'linux'
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-linux
        path: src/dist/gomoku-linux-x86_64.tar.gz

    - name: Upload Windows artifact
      if: matrix.target == 'windows'
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-windows
        path: gomoku-windows-x64.exe

    - name: Upload macOS artifact
      if: matrix.target == 'macos'
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-macos
        path: src/dist/gomoku-macos-universal.dmg

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate checksums
      run: |
        cd artifacts
        # Find all files and generate checksums
        find . -type f -name "gomoku-*" | sort | while read file; do
          sha256sum "$file" >> checksums.txt
        done
        cat checksums.txt

    - name: Generate Release Notes
      run: |
        # 从标签信息生成发布说明
        cat > release_notes.md << 'EOF'
        ## 五子棋游戏 ${{ github.ref_name }}

        ### 下载
        - Windows: `gomoku-windows-x64.exe`
        - Linux: `gomoku-linux-x86_64.tar.gz`
        - macOS: `gomoku-macos-universal.dmg`

        ### 校验
        请查看 `checksums.txt` 验证文件完整性。

        ### 系统要求
        - Windows 10/11
        - Linux with SDL2 support
        - macOS 10.15+
        EOF

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release_notes.md
        files: artifacts/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
